# Combined Tracking DQA: New Sample + Baseline (concatenated at runtime)
input_files:
  - Tracking_Survey_NewSample.csv
  - Tracking_Survey_Baseline.csv

columns:
  record_key: KEY
  instance_id: instanceID
  submission_date: SubmissionDate
  enumerator: enumerator
  enumerator_id: enumerator_id
  deviceid: deviceid
  starttime: starttime
  endtime: endtime
  duration: duration
  gps_lat: gps-Latitude_1
  gps_lon: gps-Longitude_1
  girl_id: girl_id_1
  girl_name: girl_name_1
  father_name: new_father_name_1
  address: new_address_1
  outcome: girl_found_1
  new_girl_found: new_girls_found
  min_score: 1
  match_threshold: 0.75
  district: district

# --- Cross-survey linkage config (Tracking -> Household) ---
linkage:
  tracking_name_prefix: "new_name_"
  tracking_father_prefix: "new_father_name_"
  tracking_found_prefix: "girl_found_"
  tracking_district_col: "district"
  found_yes: 1

  hh_girl_col: "girlname_label"
  hh_father_col: "fathername_label"
  hh_address_col: "address_label"
  hh_landmark_col: "landmark_label"
  hh_village_col: "village_label"
  hh_district_col: "district"

  use_district_filter: true
  hh_name_father_accept: 75

  # dummy detection knobs
  dummy_min_len: 3
  dummy_no_vowel_len: 6
  # allow_short_location: ["kot", "masjid", "ggps", "near"]
  # dummy_tokens: ["na","n/a","none","test","dummy","-","_","..."]
  # dummy_keyboard: ["asdf","qwerty","zxcv"]
  # name_stop_tokens: ["m","muhammad","khan"]


  # listed_girl_* == 1 means eligible/listed girl


