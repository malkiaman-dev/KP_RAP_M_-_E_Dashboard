input_file: Household_Survey.csv
columns:
  record_key: KEY
  instance_id: instanceID
  submission_date: SubmissionDate
  enumerator: enumerator
  enumerator_id: enumerator_id
  deviceid: deviceid
  starttime: starttime
  endtime: endtime
  duration: duration
  electricity: electricity_connection
  assets_fridge: refrigerator
  income: hh_income

  hh_roster_max: 14
  sibling_roster_max: 11
  edu_roster_max: 11
  min_parent_child_gap_years: 12
  dob_age_tolerance_years: 2
  large_household_threshold: 20
  age_round_ratio_threshold: 0.70
  age_round_min_members: 5
  # Prefer SurveyCTO `duration` (active seconds). Wall-clock start/end is fallback only.
  critical_fast_duration_minutes: 10
  min_survey_duration_minutes: 15
  long_duration_warn_minutes: 120
  long_duration_critical_minutes: 180
  transport_eligible_edu_code: 3
  girl_id: girl

  electricity: electricity_connection

asset_cols:
  - refrigerator
  - tv_vcr
  - washingmachine_dryer
  - air_conditioner
  - computer_laptop

relation_value_map:
    "1": Step-Father\Father
    "2": Step-Mother\Mother
    "3": Husband
    "4": Father-in-law
    "5": Mother-in-law
    "6": Brother-in-law
    "7": Sister-in-law
    "8": Grand Father
    "9": Grand Mother
    "10": Uncle
    "11": Aunt
    "12": other (specify)
    
edu_value_map:
  "1": Never attended school/institution
  "2": Attended school/ Institution in the past
  "3": Currently attending school/institution

marital_value_map:
  "1": never married
  "2": married
  "3": widowed
  "4": divorced

  grade_value_map:
    "4": 4
    "5": 5
    "6": 6
    "7": 7
    "8": 8

